<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home|Page</title>
    <!-- daisyUI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="bg-slate-50 min-h-screen">



    <header class=" box-border w-full h-20 mx-auto  content-center bg-white border-b-white shadow-sm">
        <div class="navbar flex justify-between px-10 py-0 ">
            <div class="">
                <a class=" text-2xl font-bold"><i class="fa-brands fa-github"></i> GitHub Issue Tracker</a>
            </div>
            <div class="flex gap-2 items-center">
                <input type="text" placeholder="Search" class="input input-bordered w-30 md:w-auto" />

                <h2 id="searchBox" class="text-md text-white px-5 py-2 rounded-sm bg-[#4A00FF]"><i
                        class="fa-solid fa-plus"></i> New Issue</h2>
            </div>
        </div>
    </header>


    <main class="w-[80%]  mx-auto pt-16 ">
        <div class=" bg-white h-20  rounded-xl px-6 content-center mb-4 ">
            <button onclick="switchTab('all')" id="tabIssue-all" class="  px-8 py-2 m-3 ">All</button>

            <button onclick="switchTab('open')" id="tabIssue-open" class=" px-8 py-2 m-3">Open</button>

            <button onclick="switchTab('closed')" id="tabIssue-closed" class=" px-8 py-2 m-3 ">Close</button>
        </div>

        <div class="count-issue">
            <div class="container flex justify-between h-20 px-6 rounded-xl content-center items-center bg-white">
                <div class=" flex gap-5">
                    <img class="bg-purple-200 px-2 py-2 p-1 rounded-full" src="assets/Aperture.png" alt="">
                    <div class="">
                        <h2 class="text-2xl font-semibold"> <span id="issueCount">0</span> Issues</h2>
                        <p class="text-sm font-semibold">Track and manage your project issues</p>
                    </div>
                </div>
                <div class=" flex flex-row items-center gap-1">
                    <p>
                    <div class="badge bg-green-600 badge-xs"></div> Open</p>
                    <p>
                    <div class="badge bg-purple-600 badge-xs"></div>CLosed</p>
                </div>
            </div>

           

            <!-- issue container  -->
            <div  class="Container mx-auto  mt-5">
                <div class="grid grid-cols-12">

                    <!-- issues is here -->
                    <div id="container" class="bg-white card card-body shadow-sm col-span-12  gap-6">
                        <!-- all cards container -->
                        <div id="allCardContainer"
                            class=" hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 md:w-full md:gap-4 Lg:gap-6  "></div>

                        <!-- open card Container -->
                        <div id="openCardContainer"
                            class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 md:w-full md:gap-4 Lg:gap-6"></div>

                        <!-- closed card Container -->
                        <div id="closedCardContainer"
                            class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 md:w-full md:gap-4 Lg:gap-6"></div>
                    </div>

                </div>

            </div>
        </div>
        </div>


        <!-- loading spinner  -->
         <span id="loadingSpinner" class="content-center  hidden loading loading-ring text-center loading-2xl"></span>
         <!-- loading spinner closed -->



        
        <dialog id="openIssueModal" class="  modal h-auto modal-bottom sm:modal-middle">
            <div class="modal-box md:w-8/12 sm:w-80  ">
                <div class=" w-full h-[400px] mx-auto items-center  space-y-3 ">
                    <div class=" items-center space-y-4">
                        <h2 id="modalTitle" class=" font-bold pt-4 text-3xl">Title</h2>
                        <div class="flex gap-10 content-center items-center text-md mb-6">
                            <li id="modalStatus" class="rounded-full bg-green-600 text-white px-2 py-1 ">opened
                            </li>
                            <li id="modalAuthor" class="modalAuthor">opened</li>
                            <li id="createdAt" class="">createdAt</li>
                        </div>
                        <div class="flex gap-5 text-md items-center content-center uppercase">
                            <p id="modalLabels" class=" rounded-full px-2 py-1 bg-yellow-200 text-yellow-600">bug</p>
                            <p class=" rounded-full px-2 py-1 bg-yellow-200 text-yellow-600" >help wanted</p>
                        </div>
                        <p id="modalDescription" class="text-md text-gray-600 pt-6 "> </p>
                        <div class=" content-center rounded-md bg-gray-50 p-4">
                            <div class=" flex justify-items-end gap-10">
                                <div class="">
                                    <p class=" text-xl text-gray-400 ">Assignee:</p>
                                    <p id="modalAssignee" class=" font-semibold text-xl  text-black "></p>
                                </div>
                                <div class="">
                                    <p class=" text-xl text-gray-400 ">Priority:</p>
                                    <p id="modalPriority" class=" text-xl px-3 font-semibold rounded-full bg-red-500 text-white"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>



                <form method="dialog modal-action">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
            </div>
        </dialog>
    </main>

    <script src="script/script.js"></script>
</body>

</html>
