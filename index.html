<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- daisyUI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- styles -->
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/styles/styles.css">

</head>

<body>

    <header class="">
        <div class="card-body form w-4/12 pt-10 px-20 mb-20 mx-auto mt-10 shadow-2xl rounded-xl  ">
            <div class="logo w-[100px] content-center mx-auto ">
                <img src="assets/github-logo.png" alt="">
            </div>
            <h2 class="text-2xl text-center font-bold ">GitHub Issues Tracker</h2>
            <h3 class="text-sm text-center"> Sign in to manage your issues</h3>
            <fieldset class="fieldset">
                <label class="label text-xl text-gray-600 font-semibold ">Username</label>
                <input id="input-username" value="" type="text" class="input rounded-md w-full bg-base-200"
                    placeholder="Enter Username" />
                <h3 class="text-left text-sm font-semibold text-[#4A00FF]">Default: admin</h3>
                <br>
                <label class="label text-xl text-gray-600 font-semibold ">Password</label>
                <input id="input-password" type="password" value="" class="input rounded-md  w-full bg-base-200"
                    placeholder="Enter Your Password" />
                <h3 class="text-left text-sm font-semibold text-[#4A00FF]">Default: admin123</h3>
                <button onclick="" id="login-btn" class="btn bg-[#4A00FF] mt-4 rounded-md text-white">Login</button>
            </fieldset>
            <fieldset class="fieldset border-t-1  border-gray-800  p-2">
                <legend class="text-center text-xl gap-3"> OR </legend>
            </fieldset>
            <h2 class="text-xs text-center">Demo Credential</h2>
            <div class="text-center text-xl border border-0.5 border-gray-100 rounded-sm bg-gray-50 align-middle p-5">
                <h2 class="text-xs font-semibold">Username: admin</h2>
                <h2 class="text-xs font-semibold">Password:admin123</h2>
            </div>
        </div>
    </header>


    <script src="script/login.js"></script>

</body>

</html>
